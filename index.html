<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGŁOŚNIA PRZYJAŹŃ - Warszawa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Stardos+Stencil:wght@700&display=swap');

        body {
           
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScHCeLrewsYbT6t2lWWv3ATenoDyJMHpZ-Ng&s'); /* Przykładowe tło, możesz zmienić */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Anton', 'Arial Black', sans-serif; /* Twarde, ostre litery */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background-color: #1a1a1a;
        }

        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); /* Zmieniaj krycie, żeby rozjaśnić/przyciemnić */
            z-index: -1;
        }

       
        h1 {
            font-family: 'Anton', sans-serif;
            font-size: 4rem;
            color: #ff4500;
            text-transform: uppercase;
            letter-spacing: -3px;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 0 #000, 4px 4px 0 rgba(255, 69, 0, 0.5);
            line-height: 0.9;
        }

        p.slogan {
            font-family: 'Stardos Stencil', serif;
            font-size: 1.5rem;
            color: #ffcc00; /* Zdzierana żółć */
            background-color: rgba(0, 0, 0, 0.8);
            padding: 5px 15px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        
        .radio-box {
            background-color: rgba(18, 18, 18, 0.9);
            border: 4px solid #333;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 10px 10px 0 #000;
            position: relative;
        }

        
        .radio-box::after {
            content: 'HALO?';
            position: absolute;
            top: -30px;
            right: -30px;
            background: #ff4500;
            color: #000;
            font-size: 1rem;
            padding: 5px 10px;
            border-radius: 50%;
            border: 2px solid #000;
            font-family: 'Stardos Stencil', serif;
            box-shadow: 3px 3px 0 #000;
            transform: rotate(15deg);
        }

        
        .phone-sticker {
            position: absolute;
            bottom: -20px;
            left: 20px;
            width: 80px;
            height: 80px;
            background: #ffffff;
            border-radius: 5px;
            transform: rotate(-10deg);
            box-shadow: 5px 5px 0 #000;
            background-image: url('https://scontent-waw2-2.xx.fbcdn.net/v/t39.30808-6/453506544_122107236314428702_5533674876366856757_n.jpg?_nc_cat=100&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=kh6vApbfhQEQ7kNvwFQV2R3&_nc_oc=AdqiCvBJWkSOtP6iU9WTEyyksI7i4uHvTsnL-VisfbNPBZk1l9cADDBnDtlisID0UWY&_nc_zt=23&_nc_ht=scontent-waw2-2.xx&_nc_gid=P4tUiV8JnqykuP-mrfdYHg&_nc_ss=7b289&oh=00_Af76GbkDQQ1XqbRQR8RTnDgC7dxiF6DzMt01ZRayzdSVTA&oe=6A0F72B2'); /* Dodaj grafikę słuchawki */
            background-size: cover;
            border: 2px solid #000;
        }

        p.status {
            font-family: 'Stardos Stencil', serif;
            font-size: 1rem;
            color: #aaaaaa;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        
        audio {
            width: 280px;
            height: 45px;
            outline: none;
            background: #000;
            border: 2px solid #ff4500;
            box-shadow: 4px 4px 0 #000;
        }

        audio::-webkit-media-controls-panel {
            background-color: #000;
        }
        audio::-webkit-media-controls-play-button,
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #ff4500;
        }
        audio::-webkit-media-controls-timeline {
            background-color: #333;
            border-radius: 2px;
        }

        .footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #555;
            font-family: 'Stardos Stencil', serif;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="radio-box">
        <h1>ROZGŁOŚNIA<br>PRZYJAŹŃ</h1>
        <p class="slogan"> OD LUDZI DLA LUDZI</p>
        <p class="status">#PrzyjaźńZostaje</p>
        
        <audio controls autoplay>
    <source src="https://sapircast.caster.fm:11372/EFVIh" type="audio/mpeg">
    Twoja przeglądarka nie obsługuje odtwarzacza audio.
</audio>

        <div class="phone-sticker"></div>
    </div>

    <div class="footer">
        &copy; 2026, OSIEDLE PRZYJAŹŃ
    </div>

</body>
</html>
